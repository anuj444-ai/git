<!DOCTYPE html>
<html>

<head>
    <title>Anuj Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: yellow;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 40px;
        }

        /* Card Style */
        .card {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 250px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        input {
            padding: 10px;
            width: 200px;
        }
    </style>
</head>

<body>

    <!-- 🔹 Navbar -->
    <nav>
        <a href="#home">Home</a>
        <a href="#skills">Skills</a>
        <a href="#product">Projects</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- 🔹 Home -->
    <section id="home">
        <h1>Anuj Dubey</h1>
        <p>Future Software Engineer 🚀</p>
    </section>

    <!-- 🔹 Skills -->
    <section id="skills">
        <h2>My Skills</h2>

        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
    </section>

    <!-- 🔹 Projects -->
    <section id="product">
        <h2>My Projects</h2>

        <div class="card">
            <h3>E-commerce Page</h3>
            <p>Product UI Design</p>
            <button onclick="alert('Project Opened')">View</button>
        </div>

        <div class="card">
            <h3>Portfolio</h3>
            <p>Personal Website</p>
            <button onclick="alert('Project Opened')">View</button>
        </div>
    </section>

    <!-- 🔹 Contact -->
    <section id="contact">
        <h2>Contact Me</h2>

        <input type="text" placeholder="Your Name"><br><br>
        <input type="email" placeholder="Your Email"><br><br>
        <button onclick="alert('Form Submitted')">Submit</button>
    </section>

</body>

</html>
